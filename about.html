<section id="about" class="about-me-section">
  <div class="about-container">
    <div class="about-grid">
      <!-- 3D Image Carousel Container -->
      <div class="about-image-container" id="about-image-container">
        <!-- Images will be injected here via JavaScript -->
      </div>
      
      <!-- Content & Controls -->
      <div class="about-content">
        <!-- Animated Text Container -->
        <div id="about-text-container" class="about-text-container">
          <h3 class="about-name" id="about-name"></h3>
          <p class="about-designation" id="about-designation"></p>
          <p class="about-quote" id="about-quote"></p>
        </div>
        
        <!-- Navigation Buttons -->
        <div class="about-arrow-buttons">
          <button class="about-arrow-button prev-button" id="about-prev-btn" aria-label="Previous image">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <button class="about-arrow-button next-button" id="about-next-btn" aria-label="Next image">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
